
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Technical Tutorial Magnifier & Zoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #3b82f6;
            --lens-size: clamp(200px, 40vw, 350px);
        }

        body, html {
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            touch-action: none;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #image-viewport {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 95%;
            max-height: 85%;
        }

        #image-container {
            position: relative;
            user-select: none;
        }

        #main-image {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .presenting #main-image {
            opacity: 0.25;
        }

        #magnifier {
            position: absolute;
            width: var(--lens-size);
            height: var(--lens-size);
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            overflow: hidden;
            display: none;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            background-color: #000;
            margin-left: calc(var(--lens-size) / -2);
            margin-top: calc(var(--lens-size) / -2);
        }

        #magnified-content {
            position: absolute;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: 0 0;
        }

        .presenting #magnifier {
            display: block;
        }

        .region-box {
            position: absolute;
            border: 2px dashed var(--accent);
            background: rgba(59, 130, 246, 0.15);
            z-index: 50;
        }

        .region-label {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 3px;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        .ui-panel {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.15);
            width: max-content;
            max-width: 90vw;
        }

        .btn {
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.875rem;
            white-space: nowrap;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

        #upload-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
        }

        @media (max-width: 640px) {
            .btn { padding: 0.4rem 0.75rem; font-size: 0.75rem; }
            #region-name { font-size: 0.75rem; }
        }
    </style>
</head>
<body class="editing">

    <div id="upload-screen">
        <h1 class="text-2xl md:text-3xl font-black mb-3 text-white">Tutorial Magnifier</h1>
        <p class="text-slate-400 mb-6 text-sm max-w-xs">Loading preset image...</p>
        <!-- Manual fallback if image fails -->
        <label id="manual-upload-btn" class="btn btn-primary px-6 cursor-pointer hidden">
            Select Local Image
            <input type="file" id="image-input" accept="image/*" class="hidden">
        </label>
    </div>

    <div id="stage">
        <div id="image-viewport">
            <div id="image-container">
                <img id="main-image" src="" alt="">
                <div id="magnifier">
                    <img id="magnified-content" src="" alt="">
                </div>
                <div id="regions-layer"></div>
            </div>
        </div>
    </div>

    <div id="edit-ui" class="ui-panel">
        <span class="text-xs hidden sm:inline">Editor Mode</span>
        <button onclick="clearRegions()" class="btn btn-secondary text-xs">Clear</button>
        <button onclick="startPresentation()" id="btn-present" class="btn btn-primary" disabled>Start</button>
    </div>

    <div id="present-ui" class="ui-panel hidden">
        <button onclick="prevRegion()" class="btn btn-secondary">←</button>
        <div class="flex flex-col items-center min-w-[100px] sm:min-w-[140px]">
            <span id="region-counter" class="text-[9px] text-blue-400 uppercase font-bold">Part 0/0</span>
            <span id="region-name" class="text-xs font-bold truncate max-w-[80px] sm:max-w-[120px]">...</span>
        </div>
        <button onclick="nextRegion()" class="btn btn-primary">Next →</button>
        <button onclick="stopPresentation()" class="btn btn-secondary text-xs">Edit</button>
    </div>

    <script>
        // --- PRESET CONFIGURATION ---
        // 1. Path to your image relative to tutorial_tool.html
        const PRESET_IMAGE_URL = "../img/machine.png"; 

        // 2. Preset coordinate regions
        // x, y are coordinates from top-left, w, h are width and height of the box
        const PRESET_REGIONS = [
            { name: "Main Engine", x: 150, y: 100, w: 200, h: 180 },
            { name: "Fuel Intake", x: 400, y: 250, w: 120, h: 120 },
            { name: "Control Panel", x: 600, y: 50, w: 150, h: 100 }
        ];
        // ---------------------------

        const imageInput = document.getElementById('image-input');
        const mainImage = document.getElementById('main-image');
        const magnifiedImg = document.getElementById('magnified-content');
        const container = document.getElementById('image-container');
        const uploadScreen = document.getElementById('upload-screen');
        const regionsLayer = document.getElementById('regions-layer');
        const magnifier = document.getElementById('magnifier');
        const regionCounter = document.getElementById('region-counter');
        const regionNameText = document.getElementById('region-name');
        
        let regions = [];
        let currentIdx = -1;
        let isDrawing = false;
        let startX, startY;
        let tempBox = null;

        // Load Preset Image
        function initPreset() {
            mainImage.onload = () => {
                magnifiedImg.src = mainImage.src;
                uploadScreen.style.display = 'none';
                
                // Load Preset Regions
                if (PRESET_REGIONS.length > 0) {
                    regions = PRESET_REGIONS;
                    renderRegions();
                    document.getElementById('btn-present').disabled = false;
                    // Auto-start presentation for the viewer
                    startPresentation();
                }
            };
            mainImage.onerror = () => {
                document.getElementById('manual-upload-btn').classList.remove('hidden');
                document.querySelector('#upload-screen p').innerText = "Preset image not found. Please upload manually.";
            };
            mainImage.src = PRESET_IMAGE_URL;
        }

        function renderRegions() {
            regionsLayer.innerHTML = '';
            regions.forEach(region => {
                const box = document.createElement('div');
                box.className = 'region-box';
                box.style.left = region.x + 'px';
                box.style.top = region.y + 'px';
                box.style.width = region.w + 'px';
                box.style.height = region.h + 'px';
                
                const label = document.createElement('div');
                label.className = 'region-label';
                label.innerText = region.name;
                box.appendChild(label);
                
                regionsLayer.appendChild(box);
            });
        }

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                mainImage.src = event.target.result;
                magnifiedImg.src = event.target.result;
                uploadScreen.style.display = 'none';
            };
            reader.readAsDataURL(file);
        };

        const handleStart = (e) => {
            if (document.body.classList.contains('presenting')) return;
            isDrawing = true;
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX - rect.left;
            startY = clientY - rect.top;

            tempBox = document.createElement('div');
            tempBox.className = 'region-box';
            tempBox.style.left = startX + 'px';
            tempBox.style.top = startY + 'px';
            regionsLayer.appendChild(tempBox);
        };

        const handleMove = (e) => {
            if (!isDrawing) return;
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const curX = clientX - rect.left;
            const curY = clientY - rect.top;

            tempBox.style.width = Math.abs(curX - startX) + 'px';
            tempBox.style.height = Math.abs(curY - startY) + 'px';
            tempBox.style.left = Math.min(curX, startX) + 'px';
            tempBox.style.top = Math.min(curY, startY) + 'px';
        };

        const handleEnd = () => {
            if (!isDrawing) return;
            isDrawing = false;
            const w = parseInt(tempBox.style.width);
            const h = parseInt(tempBox.style.height);

            if (isNaN(w) || w < 20 || h < 20) {
                tempBox.remove();
                return;
            }

            const name = prompt("Name this region:") || `Part ${regions.length + 1}`;
            regions.push({
                name: name,
                x: parseInt(tempBox.style.left),
                y: parseInt(tempBox.style.top),
                w: w,
                h: h
            });
            
            const label = document.createElement('div');
            label.className = 'region-label';
            label.innerText = name;
            tempBox.appendChild(label);
            document.getElementById('btn-present').disabled = false;
        };

        container.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        container.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        function clearRegions() {
            regions = [];
            regionsLayer.innerHTML = '';
            document.getElementById('btn-present').disabled = true;
        }

        function startPresentation() {
            document.body.classList.remove('editing');
            document.body.classList.add('presenting');
            document.getElementById('edit-ui').classList.add('hidden');
            document.getElementById('present-ui').classList.remove('hidden');
            regionsLayer.style.display = 'none';
            currentIdx = -1;
            nextRegion();
        }

        function stopPresentation() {
            document.body.classList.add('editing');
            document.body.classList.remove('presenting');
            document.getElementById('edit-ui').classList.remove('hidden');
            document.getElementById('present-ui').classList.add('hidden');
            regionsLayer.style.display = 'block';
        }

        function nextRegion() {
            if (currentIdx < regions.length - 1) {
                currentIdx++;
                updateLens(regions[currentIdx]);
            }
        }

        function prevRegion() {
            if (currentIdx > 0) {
                currentIdx--;
                updateLens(regions[currentIdx]);
            }
        }

        function updateLens(region) {
            regionCounter.innerText = `Part ${currentIdx + 1}/${regions.length}`;
            regionNameText.innerText = region.name;
            const targetX = region.x + (region.w / 2);
            const targetY = region.y + (region.h / 2);
            magnifier.style.transform = `translate(${targetX}px, ${targetY}px)`;
            const lensRadius = magnifier.offsetWidth / 2;
            const zoomScale = (lensRadius * 1.6) / Math.max(region.w, region.h);
            const moveX = (lensRadius / zoomScale) - targetX;
            const moveY = (lensRadius / zoomScale) - targetY;
            magnifiedImg.style.transform = `scale(${zoomScale}) translate(${moveX}px, ${moveY}px)`;
        }

        window.addEventListener('keydown', (e) => {
            if (!document.body.classList.contains('presenting')) return;
            if (e.key === 'ArrowRight' || e.key === ' ') nextRegion();
            if (e.key === 'ArrowLeft') prevRegion();
            if (e.key === 'Escape') stopPresentation();
        });

        // Initialize preset mode on load
        window.onload = initPreset;
    </script>
</body>
</html>
