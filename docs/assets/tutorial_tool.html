<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Machine Tutorial</title>
    <style>
        body { background: #000; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; margin: 0; }
        #container { position: relative; display: inline-block; background: #111; min-width: 300px; min-height: 300px; }
        #bg-img { max-width: 95vw; max-height: 75vh; opacity: 1; display: block; cursor: pointer; transition: opacity 0.8s; -webkit-tap-highlight-color: transparent; }
        #lens { 
            position: absolute; width: 380px; height: 380px; border-radius: 50%; border: 4px solid #3b82f6; 
            overflow: hidden; z-index: 100; box-shadow: 0 0 100px #000; background: #000; pointer-events: none; 
            opacity: 0; transition: left 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
        }
        #mag-img { position: absolute; transform-origin: 0 0; max-width: none; border: none; transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); }

        .ui-nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 1rem 2rem; border-radius: 4rem; display: flex; gap: 1.5rem; align-items: center; border: 1px solid rgba(255,255,255,0.1); min-width: 320px; justify-content: space-between; z-index: 1000; }
        .btn { padding: 0.8rem 2rem; background: #3b82f6; border-radius: 2.5rem; cursor: pointer; font-weight: 800; border: none; color: white; transition: 0.2s; font-size: 0.9rem; touch-action: manipulation; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-nav { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: white; }

        #note-card {
            position: fixed; top: 2rem; right: 2rem; width: 300px; background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);
            transform: translateX(400px); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 1001;
        }
        #note-card.active { transform: translateX(0); }

        @media (max-width: 768px) {
            #note-card { top: 1rem; right: 1rem; left: 1rem; width: auto; transform: translateY(-200%); }
            #note-card.active { transform: translateY(0); }
            #lens { width: 280px; height: 280px; }
            .ui-nav { width: 90%; bottom: 1rem; padding: 0.8rem; }
        }
    </style>
</head>
<body>
    <div id="container"><img id="bg-img" src="../img/machine.png" onclick="reset()"><div id="lens"><img id="mag-img" src="../img/machine.png"></div></div>
    <div id="note-card">
        <div id="n-count" style="font-size: 10px; color: #60a5fa; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 5px;">STEP 1</div>
        <h2 id="n-name" style="margin: 0 0 10px 0; font-size: 18px;">Part</h2>
        <p id="n-text" style="margin: 0; color: #cbd5e1; font-size: 14px; line-height: 1.6;">Desc...</p>
    </div>
    <div class="ui-nav">
        <button id="start-btn" onclick="start()" class="btn" style="width: 100%">Start Learning Tutorial</button>
        <div id="controls" style="display:none; width:100%; display:flex; align-items:center; justify-content:space-between;">
            <button onclick="move(-1)" class="btn-nav">←</button>
            <div style="text-align:center"><div id="ui-name" style="font-weight: 700; font-size: 16px;">Name</div></div>
            <button onclick="move(1)" class="btn">Next Step →</button>
        </div>
    </div>
    <script>
        const regions = [
  {
    "name": "Quill",
    "note": "Up Down",
    "pctX": 0.30266666666666664,
    "pctY": 0.09926613261218176,
    "pctW": 0.20333333333333334,
    "pctH": 0.3024406392664624
  },
  {
    "name": "Motor",
    "note": "Goes Spin",
    "pctX": 0.27599999999999997,
    "pctY": 0.02587980102546659,
    "pctW": 0.31333333333333335,
    "pctH": 0.2068160253807427
  },
  {
    "name": "Start",
    "note": "Reverse for high Speed",
    "pctX": 0.376,
    "pctY": 0.5128970714595522,
    "pctW": 0.17333333333333334,
    "pctH": 0.13787735025382847
  },
  {
    "name": "Change Speed",
    "note": "Faster or slower",
    "pctX": 0.346,
    "pctY": 0.15930949481949414,
    "pctW": 0.09,
    "pctH": 0.07116250335681469
  },
  {
    "name": "Knee",
    "note": "Up Down",
    "pctX": 0.066,
    "pctY": 0.5484783231379595,
    "pctW": 0.24333333333333335,
    "pctH": 0.18680157131163858
  },
  {
    "name": "Table",
    "note": "Parts fit here",
    "pctX": 0.022666633333333335,
    "pctY": 0.4417345681027375,
    "pctW": 0.88,
    "pctH": 0.16678711724253442
  }
];
        let idx = -1;
        const bg = document.getElementById('bg-img');
        const mag = document.getElementById('mag-img');
        const lens = document.getElementById('lens');
        const card = document.getElementById('note-card');
        const ctrl = document.getElementById('controls');
        const startBtn = document.getElementById('start-btn');

        function start() { startBtn.style.display='none'; ctrl.style.display='flex'; idx=0; update(); }
        function reset() { idx=-1; lens.style.opacity='0'; card.classList.remove('active'); startBtn.style.display='block'; ctrl.style.display='none'; bg.style.opacity='1'; }
        
        function update() {
            if(idx < 0) return;
            bg.style.opacity = '0.15';
            const r = regions[idx];
            document.getElementById('n-count').innerText = "STEP " + (idx + 1) + "/" + regions.length;
            document.getElementById('n-name').innerText = r.name;
            document.getElementById('n-text').innerText = r.note;
            document.getElementById('ui-name').innerText = r.name;
            const rect = bg.getBoundingClientRect();
            const w_ref = rect.width, h_ref = rect.height;
            const l_size = window.innerWidth < 768 ? 280 : 380;
            const rad = l_size/2;
            const cx = (r.pctX + r.pctW/2) * w_ref, cy = (r.pctY + r.pctH/2) * h_ref;
            lens.style.display = 'block'; setTimeout(()=>lens.style.opacity='1',10);
            lens.style.left = (cx - rad) + "px"; lens.style.top = (cy - rad) + "px";
            const zoom = (rad * 1.8) / Math.max(r.pctW * w_ref, r.pctH * h_ref);
            mag.style.width = w_ref + "px"; mag.style.height = h_ref + "px";
            mag.style.transform = "scale(" + zoom + ") translate(" + ((rad/zoom) - cx) + "px," + ((rad/zoom) - cy) + "px)";
            card.classList.add('active');
        }
        function move(n) { idx = (idx + n + regions.length) % regions.length; update(); }
        window.onresize = update;
    </script>
</body></html>
