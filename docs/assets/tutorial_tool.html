<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Machine Tutorial</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: white; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        
        #stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #image-container { position: relative; line-height: 0; display: inline-block; }
        
        #main-img { max-width: 90vw; max-height: 80vh; display: block; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); pointer-events: auto; transition: opacity 0.6s ease, filter 0.6s ease; cursor: pointer; }
        
        /* Hardware Synced Engine */
        #magnifier { position: absolute; border-radius: 50%; border: 4px solid #3b82f6; box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.5); overflow: hidden; z-index: 100; pointer-events: none; opacity: 0; visibility: hidden; background: #000;
            transition: left 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease, visibility 0.4s; }
        #magnifier.active { opacity: 1; visibility: visible; }
        
        #mag-content { position: absolute; display: block; max-width: none !important; max-height: none !important; min-width: 0 !important; min-height: 0 !important; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), left 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        /* Interactive Hotspots */
        .hotspot { position: absolute; width: 36px; height: 36px; background: rgba(59, 130, 246, 0.4); border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; z-index: 50; cursor: pointer; transform: translate(-50%, -50%); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .hotspot::after { content: ''; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px rgba(255,255,255,1); animation: pulse 2s infinite; }
        .hotspot:hover { background: #3b82f6; transform: translate(-50%, -50%) scale(1.3); z-index: 60; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
        
        body.stepping .hotspot { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0); }
        body.stepping #main-img { opacity: 0.15 !important; filter: grayscale(0.5) !important; }
        
        /* Perspective Map */
        #perspective-map { position: fixed; top: 50%; left: 2rem; width: 220px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 0.5rem; overflow: hidden; z-index: 900; opacity: 0; transform: translateY(-50%) translateX(-50px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); pointer-events: none; }
        #perspective-map.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
        #perspective-map img { width: 100%; height: auto; display: block; opacity: 0.4; border-radius: 0.5rem; }
        #radar-icon { position: absolute; width: 16px; height: 16px; background: #3b82f6; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 2; transition: left 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), top 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }
        
        /* Note Panel */
        #note-panel { position: fixed; top: 2rem; right: 2rem; width: 360px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); padding: 2rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); transform: translateX(400px); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 1100; box-shadow: -20px 20px 50px rgba(0,0,0,0.5); }
        #note-panel.visible { transform: translateX(0); }
        
        /* Bottom UI */
        .ui-dock { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); padding: 1rem 2rem; border-radius: 4rem; display: flex; gap: 2rem; align-items: center; border: 1px solid rgba(255,255,255,0.15); z-index: 1000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        
        .btn { padding: 0.8rem 2.5rem; background: #3b82f6; border-radius: 2rem; font-weight: 700; font-size: 1rem; cursor: pointer; border: none; color: white; white-space: nowrap; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-nav { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-nav:hover { background: rgba(255,255,255,0.2); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #perspective-map { display: none; }
            #note-panel { top: auto; bottom: 8rem; right: 1rem; left: 1rem; width: auto; transform: translateY(300px); }
            #note-panel.visible { transform: translateY(0); }
            .ui-dock { width: 95%; max-width: 450px; padding: 0.8rem 1.5rem; bottom: 1rem; gap: 1rem; }
        }
    </style>
</head>
<body class="overview">
    <div id="stage" onclick="handleStageClick(event)">
        <div id="image-container">
            <img id="main-img" src="../img/machine.png" onerror="showError()">
            <div id="magnifier"><img id="mag-content" src="../img/machine.png"></div>
            <div id="hotspot-layer"></div>
        </div>
    </div>

    <div id="perspective-map">
        <div style="position: relative; width: 100%; height: 100%; border-radius: 0.5rem; overflow: hidden;">
            <img src="../img/machine.png">
            <div id="radar-icon"></div>
        </div>
    </div>

    <div id="note-panel">
        <button onclick="resetView()" style="position:absolute; top:1.5rem; right:1.5rem; width:2.5rem; height:2.5rem; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,255,255,0.1); color:white; border:none; cursor:pointer;">
            <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
            <div style="height: 4px; width: 32px; background: #3b82f6; border-radius: 4px;"></div>
            <span id="panel-step" style="font-size: 12px; font-weight: 900; color: #3b82f6; letter-spacing: 0.1em; text-transform: uppercase;">STEP 01</span>
        </div>
        <h3 id="panel-name" style="font-size: 24px; font-weight: bold; margin: 0 0 16px 0; padding-right: 32px;">Part Name</h3>
        <p id="panel-note" style="color: #cbd5e1; font-size: 15px; line-height: 1.6; margin: 0 0 20px 0;">Instructions...</p>
        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; text-align: center; letter-spacing: 0.05em;">
            Click background to exit focus
        </div>
    </div>

    <div class="ui-dock">
        <button id="btn-start" onclick="startTutorial()" class="btn" style="width: 100%;">Start Interactive Tutorial</button>
        <div id="nav-group" class="hidden" style="width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 1rem;">
            <button onclick="move(-1)" class="btn-nav">
                <svg style="width:24px;height:24px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div style="text-align: center; flex: 1;">
                <div id="pres-step" style="font-size: 10px; font-weight: 900; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">PART 1/5</div>
                <div id="pres-name" style="font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; margin: 0 auto;">Component</div>
            </div>
            <button onclick="move(1)" class="btn-nav" style="background: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);">
                <svg style="width:24px;height:24px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const regions = [
  {
    "name": "Table",
    "note": "This is a table",
    "x": 0.9481112631227964,
    "y": 0.6066440839326347,
    "w": null,
    "h": null
  },
  {
    "name": "Quill",
    "note": "This is a quill",
    "x": 0.24090925537156066,
    "y": 0.08320968443610605,
    "w": null,
    "h": null
  },
  {
    "name": "Motor",
    "note": "This is a motor",
    "x": 0.6153103182986854,
    "y": 0.23887722375317744,
    "w": null,
    "h": null
  },
  {
    "name": "Knee",
    "note": "This is a knee",
    "x": 0.359766735665886,
    "y": 0.7350706065349849,
    "w": null,
    "h": null
  }
];
        let currentIdx = -1;
        
        const container = document.getElementById('image-container');
        const mainImg = document.getElementById('main-img');
        const magImg = document.getElementById('mag-content');
        const magnifier = document.getElementById('magnifier');
        const hotspotLayer = document.getElementById('hotspot-layer');
        const radar = document.getElementById('radar-icon');

        function showError() {
            document.body.innerHTML = '<div style="color:white; padding: 20px; text-align:center; font-family:sans-serif;"><h2>Image Load Error</h2><p>Cannot find image at path: <b>../img/machine.png</b></p></div>';
        }

        function init() {
            hotspotLayer.innerHTML = '';
            regions.forEach((r, idx) => {
                const h = document.createElement('div');
                h.className = 'hotspot';
                h.style.left = ((r.x + r.w/2) * 100) + '%';
                h.style.top = ((r.y + r.h/2) * 100) + '%';
                h.onclick = (e) => { e.stopPropagation(); jumpToAsset(idx); };
                hotspotLayer.appendChild(h);
            });
        }

        function startTutorial() { jumpToAsset(0); }

        function jumpToAsset(idx) {
            document.body.classList.remove('overview');
            document.body.classList.add('stepping');
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('nav-group').classList.remove('hidden');
            document.getElementById('nav-group').style.display = 'flex';
            currentIdx = idx;
            updateDisplay();
        }

        function resetView() {
            document.body.classList.add('overview');
            document.body.classList.remove('stepping');
            magnifier.classList.remove('active');
            document.getElementById('note-panel').classList.remove('visible');
            document.getElementById('perspective-map').classList.remove('visible');
            currentIdx = -1;
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('nav-group').classList.add('hidden');
            document.getElementById('nav-group').style.display = '';
        }

        function handleStageClick(e) {
            if (document.body.classList.contains('stepping') && e.target === mainImg) resetView();
        }

        function move(dir) {
            currentIdx += dir;
            if (currentIdx < 0) currentIdx = regions.length - 1;
            if (currentIdx >= regions.length) currentIdx = 0;
            updateDisplay();
        }

        function updateDisplay() {
            if (!regions.length || currentIdx < 0) return;
            const r = regions[currentIdx];
            const imgRect = mainImg.getBoundingClientRect();
            if (imgRect.width === 0) return;
            
            document.getElementById('pres-step').innerText = 'PART ' + (currentIdx+1) + ' / ' + regions.length;
            document.getElementById('pres-name').innerText = r.name;
            document.getElementById('panel-step').innerText = 'STEP ' + String(currentIdx+1).padStart(2, '0');
            document.getElementById('panel-name').innerText = r.name;
            document.getElementById('panel-note').innerText = r.note;

            const lSize = window.innerWidth < 768 ? 280 : 380;
            const radius = lSize / 2;
            
            const cx = (r.x + r.w/2) * imgRect.width;
            const cy = (r.y + r.h/2) * imgRect.height;

            let lensLeft = cx - radius;
            let lensTop = cy - radius;
            lensLeft = Math.max(0, Math.min(lensLeft, imgRect.width - lSize));
            lensTop = Math.max(0, Math.min(lensTop, imgRect.height - lSize));

            magnifier.style.setProperty('width', lSize + 'px', 'important');
            magnifier.style.setProperty('height', lSize + 'px', 'important');
            magnifier.style.setProperty('left', lensLeft + 'px', 'important');
            magnifier.style.setProperty('top', lensTop + 'px', 'important');
            magnifier.classList.add('active');

            let zoom = (radius * 1.6) / Math.max(r.w * imgRect.width, r.h * imgRect.height);
            zoom = Math.max(1.2, Math.min(zoom, 3.5));
            
            const newW = imgRect.width * zoom;
            const newH = imgRect.height * zoom;
            const tx = cx - lensLeft - (cx * zoom);
            const ty = cy - lensTop - (cy * zoom);

            magImg.style.setProperty('width', newW + 'px', 'important');
            magImg.style.setProperty('height', newH + 'px', 'important');
            magImg.style.setProperty('left', tx + 'px', 'important');
            magImg.style.setProperty('top', ty + 'px', 'important');

            document.getElementById('note-panel').classList.add('visible');
            document.getElementById('perspective-map').classList.add('visible');
            document.getElementById('radar-icon').style.left = ((r.x + r.w/2) * 100) + '%';
            document.getElementById('radar-icon').style.top = ((r.y + r.h/2) * 100) + '%';
        }

        window.onresize = () => {
            if (currentIdx >= 0) updateDisplay();
            init();
        };
        window.onkeydown = (e) => { 
            if (currentIdx >= 0) {
                if (e.key === 'ArrowRight') move(1); 
                if (e.key === 'ArrowLeft') move(-1);
                if (e.key === 'Escape') resetView();
            }
        };

        mainImg.onload = init;
        if(mainImg.complete) init();

    </script>
</body>
</html>
