<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Machine Tutorial</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#020617; color:white; font-family:sans-serif; overflow:hidden; }
        #stage { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
        #main-img { max-width:90vw; max-height:80vh; border-radius:8px; box-shadow:0 20px 50px rgba(0,0,0,0.5); transition: opacity 0.5s; cursor:pointer; }
        #lens { position:absolute; border:4px solid #3b82f6; box-shadow:0 0 50px rgba(0,0,0,0.8); overflow:hidden; z-index:100; pointer-events:none; opacity:0; transform:scale(0.8); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #lens.active { opacity:1; transform:scale(1); }
        #lens-img { position:absolute; transform-origin:0 0; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .hotspot { position:absolute; width:30px; height:30px; background:rgba(59,130,246,0.3); border:2px solid white; border-radius:50%; transform:translate(-50%, -50%); cursor:pointer; z-index:50; }
        .hotspot:hover { background: #3b82f6; }
        #ui { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(15,23,42,0.9); padding:15px 30px; border-radius:50px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:20px; z-index:200; }
        button { background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer; }
        #panel { position:fixed; top:20px; right:20px; width:300px; background:rgba(15,23,42,0.9); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); transform:translateX(400px); transition:0.5s; z-index:200; }
        #panel.active { transform:translateX(0); }
        body.focus #main-img { opacity: 0.2; }
        body.focus .hotspot { display:none; }
    </style>
</head>
<body>
    <div id="stage" onclick="reset()">
        <div style="position:relative; line-height:0;">
            <img id="main-img" src="img/machine.png">
            <div id="lens"><img id="lens-img" src="img/machine.png"></div>
            <div id="hotspots"></div>
        </div>
    </div>
    <div id="panel"><h3 id="p-name"></h3><p id="p-note"></p></div>
    <div id="ui"><button id="start-btn" onclick="goTo(0)">Start Tutorial</button>
        <div id="nav" style="display:none; align-items:center; gap:15px;">
            <button onclick="move(-1)">Prev</button>
            <span id="counter">1/1</span>
            <button onclick="move(1)">Next</button>
        </div>
    </div>
    <script>
        const steps = [
  {
    "name": "Handle",
    "note": "fdhjlhfdsajklhfsdjkla",
    "cx": 0.5336468055594935,
    "cy": 0.28688733332406896,
    "span": 0.2,
    "shape": "circle"
  },
  {
    "name": "Speed",
    "note": "fhdsjkhfdsjklhfasjkdl",
    "cx": 0.3968508287004511,
    "cy": 0.18984299127866647,
    "span": 0.15,
    "shape": "circle"
  },
  {
    "name": "Knee",
    "note": "fdjshlhfsdjklahfsdjkla",
    "cx": 0.18310711485819736,
    "cy": 0.6526698533413554,
    "span": 0.26,
    "shape": "circle"
  }
];
        let cur = -1;
        const img = document.getElementById('main-img');
        const lens = document.getElementById('lens');
        const lensImg = document.getElementById('lens-img');
        const hotspots = document.getElementById('hotspots');

        function init() {
            hotspots.innerHTML = '';
            steps.forEach((s, i) => {
                const h = document.createElement('div');
                h.className = 'hotspot';
                h.style.left = (s.cx * 100) + '%';
                h.style.top = (s.cy * 100) + '%';
                h.onclick = (e) => { e.stopPropagation(); goTo(i); };
                hotspots.appendChild(h);
            });
        }

        function reset() {
            document.body.classList.remove('focus');
            lens.classList.remove('active');
            document.getElementById('panel').classList.remove('active');
            document.getElementById('nav').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            cur = -1;
        }

        function move(d) { goTo((cur + d + steps.length) % steps.length); }

        function goTo(i) {
            cur = i;
            document.body.classList.add('focus');
            document.getElementById('nav').style.display = 'flex';
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('counter').innerText = (cur+1) + '/' + steps.length;
            
            const s = steps[cur];
            document.getElementById('p-name').innerText = s.name;
            document.getElementById('p-note').innerText = s.note;
            document.getElementById('panel').classList.add('active');

            const rect = img.getBoundingClientRect();
            const isCircle = s.shape === 'circle';
            const L = window.innerWidth < 768 ? 200 : 300;
            const w = isCircle ? L : L*1.2;
            const h = isCircle ? L : L*0.8;
            
            lens.style.width = w + 'px';
            lens.style.height = h + 'px';
            lens.style.borderRadius = isCircle ? '50%' : '15px';
            
            const pxCx = s.cx * rect.width;
            const pxCy = s.cy * rect.height;
            lens.style.left = (pxCx - w/2) + 'px';
            lens.style.top = (pxCy - h/2) + 'px';
            
            const zoom = w / (s.span * rect.width);
            lensImg.style.width = (rect.width * zoom) + 'px';
            lensImg.style.height = (rect.height * zoom) + 'px';
            lensImg.style.transform = 'translate(' + (w/2 - pxCx*zoom) + 'px,' + (h/2 - pxCy*zoom) + 'px)';
            lens.classList.add('active');
        }

        img.onload = init;
        if(img.complete) init();
    </script>
</body>
</html>
