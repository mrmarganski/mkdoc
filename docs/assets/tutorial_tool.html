<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Tutorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #container { position: relative; }
        #main-img { max-width: 95vw; max-height: 85vh; opacity: 0.15; transition: opacity 0.5s; }
        #lens { position: absolute; width: 320px; height: 320px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; z-index: 100; box-shadow: 0 0 80px #000; background: #000; top: 0; left: 0; }
        #mag-img { position: absolute; transform-origin: 0 0; max-width: none; }
        .ui { position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,0.85); backdrop-filter: blur(20px); padding: 0.6rem 1.2rem; border-radius: 2rem; display: flex; gap: 1rem; align-items: center; border: 1px solid rgba(255,255,255,0.1); width: 360px; justify-content: space-between; }
        .btn-next { padding: 0.6rem 2rem; background: #3b82f6; border-radius: 1.5rem; cursor: pointer; font-weight: 800; border: none; color: white; flex: 1; margin-left: 10px; }
        .btn-prev { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 50%; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container">
        <img id="main-img" src="https://raw.githubusercontent.com/username/repo/main/machine.png">
        <div id="lens"><img id="mag-img" src="https://raw.githubusercontent.com/username/repo/main/machine.png"></div>
    </div>
    <div class="ui">
        <button onclick="change(-1)" class="btn-prev">←</button>
        <div style="text-align:center; flex: 1">
            <div id="count" style="font-size: 9px; color: #60a5fa; font-weight: 900; letter-spacing: 0.1em;">PART 1</div>
            <div id="name" style="font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; margin: 0 auto;">Loading...</div>
        </div>
        <button onclick="change(1)" class="btn-next">Next →</button>
    </div>
    <script>
        const regions = [
  {
    "name": "Head",
    "x": 76,
    "y": 38,
    "w": 151,
    "h": 119
  },
  {
    "name": "Travel",
    "x": 20,
    "y": 245,
    "w": 309,
    "h": 75
  },
  {
    "name": "Knee",
    "x": 3,
    "y": 295,
    "w": 134,
    "h": 104
  },
  {
    "name": "Quill",
    "x": 90,
    "y": 44,
    "w": 111,
    "h": 169
  }
];
        let idx = 0;
        function update() {
            const r = regions[idx];
            document.getElementById('count').innerText = "PART " + (idx + 1) + "/" + regions.length;
            document.getElementById('name').innerText = r.name;
            const cx = r.x + (r.w/2), cy = r.y + (r.h/2), rad = 160;
            const lens = document.getElementById('lens');
            lens.style.left = (cx - rad) + "px"; lens.style.top = (cy - rad) + "px";
            const zoom = (rad * 1.8) / Math.max(r.w, r.h);
            document.getElementById('mag-img').style.transform = "scale(" + zoom + ") translate(" + ((rad/zoom) - cx) + "px," + ((rad/zoom) - cy) + "px)";
        }
        function change(n) { idx = Math.max(0, Math.min(regions.length - 1, idx + n)); update(); }
        window.onload = update;
        window.onkeydown = (e) => { if(e.key === 'ArrowRight') change(1); if(e.key === 'ArrowLeft') change(-1); };
    </script>
</body></html>
