site_name: FRC Team 2064 Robotics Guide
site_description: Getting started in FRC!!
site_author: Team 2064 - The Panther Project
copyright: FRC Team 2064 ~ The Panther Project
repo_url: https://github.com/mrmarganski/mkdoc

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png
  favicon: img/favicon.ico
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/frc2064/

extra_javascript:
  - js/mermaid.min.js
  - js/custom.js

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:   
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - XRP Robotics:
      - XRP Introduction: xrp-bot.md
      - XRP Module 1.1 - Basic XRP Build Guide: Build.md
      - XRP Module 1.2 - Install WPIlib for XRP: gettingtoknow.md
      - XRP Module 1.3 - Command Based XRP Code: basicdriveXRP.md
      - XRP Module 1.4 - Show your skills: XRPdrivechallenge.md
      - XRP Module 2.0 - Game Design Concepts: Ping-Pong-Launcher-Challenge.md
      - XRP Module 2.1 - Game Assembly Guide: PingPongAssemble.md
      - XRP Module 2.2 - Game Wiring Guide: wiringpingpongxrp.md
      - XRP Module 2.3 - Coding for Challenge: pingpongcode.md
      - XRP Module 2.4 - Ping Pong Game Rules: PingPongCompetition.md
  - CAD & Design:
      - FRC Design CAD: CAD.md
      - Show Your Skills: cadonshapecourse.md
  - Programming for FRC:
      - FRC JAVA & WPIlib: WPIlib.md
      - Show Your Skills: advancedjava.md
  - Safety:
      - Safety Overview: Safety.md
      - Show Your Skills: Safetyquiz.md
  - FRC Robot Basics:
      - Engineering Design Process: designprocess.md
      - Bumpers: bumpers.md
  - Hand Tools:
      - Closet Organization Method: Closet.md
      - Hand Tools Overview: Handtools.md
      - Crimping: crimping.md
      - Show Your Skills: handtoolsquiz.md
  - Machine Tools:
      - 3D Printing: 3dprinting.md
      - Bandsaw: bandsaw.md
      - Lathe: lathe.md
      - Milling Machine: millingmachine.md
      - CNC Router: cncrouter.md
      - Laser Engraver: laserengraver.md
      - Show Your Skills: machinelessons.md
  - Design and Media:
      - Cricut Vinyl Cutter: cricut.md
      - Button Maker: buttonmaker.md
      - Photoshop: photoshop.md
      - Adobe Illustrator: illustrator.md
      - Branding: branding.md
      - Public Speaking: publicspeaking.md
  - Learning Resources:
      - Glossary: frckeywords.md
      - Rubric: rubric.md
