site_name: FRC Team 2064 Robotics Guide
site_description: Getting started in FRC!!
site_author: Team 2064 - The Panther Project
copyright: FRC Team 2064 ~ The Panther Project
repo_url: https://github.com/mrmarganski/mkdoc

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png
  favicon: img/favicon.ico
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/frc2064/
  # Variables placed below here
  season_year: "2026-2027"
  team_name: "The Panther Project - FRC Team 2064"
  lead_mentor: "Mr. Marganski"

extra_javascript:
  - js/mermaid.min.js
  - js/custom.js

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:   
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - macros:
      include_yaml: 
        - variables.yml

