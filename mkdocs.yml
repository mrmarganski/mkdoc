site_name: FRC Team 2064 Robotics Guide
site_description: Getting started in FRC!!
site_author: Team 2064 - The Panther Project
copyright: FRC Team 2064 ~ The Panther Project

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png
  favicon: img/favicon.ico

features:
  - content.code.copy
  - content.tabs.link
  - navigation.sections
  - navigation.expand
  - navigation.top
  - navigation.path
  - navigation.footer
  - toc.integrate

extra:
 social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/frc2064/

extra_javascript:
   - js/custom.js  

extra_css:
  - css/custom.css  

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - admonition
  # - pwndownx.details

plugins:
  - search
  # - glightbox

nav:
  - Home: index.md
  - XRP Bot: xrp-bot.md
  - XRP Build: Build.md
  - XRP Design for Ping Pong: Ping-Pong-Launcher-Challenge.md
  - Assemble XRP for Ping Pong: PingPongAssemble.md
  - Coding XRP for Ping Pong: gettingtoknow.md
  - FRC Design CAD: CAD.md
  
