site_name: FRC Team 2064 Robotics Guide
site_description: Getting started in FRC!!
site_author: Team 2064 - The Panther Project
copyright: FRC Team 2064 ~ The Panther Project
repo_url: https://github.com/mrmarganski/mkdoc

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png
  favicon: img/favicon.ico
  features:  # <- THIS MUST BE INDENTED HERE
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/frc2064/

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - js/custom.js

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - XRP Robotics:
      - Introduction: xrp-bot.md
      - Build Guide: Build.md
      - Wiring & Hardware: gettingtoknow.md
      - Basic Movement: basicdriveXRP.md
      - Show your skills: XRPdrivechallenge.md
  - XRP Ping Pong Challenge:
      - Design Concepts: Ping-Pong-Launcher-Challenge.md
      - Assembly Guide: PingPongAssemble.md
      - Wiring Guide: wiringpingpongxrp.md 
      - Coding XRP for Challenge: pingpongcode.md
      - Show Your Skills: PingPongCompetition.md
  - CAD & Design:
      - FRC Design CAD: CAD.md
      - Show Your Skills: cadonshapecourse.md
  - Programming:
      - FRC JAVA & WPIlib: WPIlib.md
      - Show Your Skills: advancedjava.md
  - Safety:
      - Safety Overview: Safety.md
      - Show Your Skills: Safetyquiz.md
  - Hand Tools:
      - Closet Organization Method: Closet.md
      - Hand Tools Overview: Handtools.md
      - Crimping: crimping.md
      - Show Your Skills: handtoolsquiz.md 
  - Machine Tools:
      - 3D Printing: 3dprinting.md
      - Bandsaw: bandsaw.md
      - Lathe: lathe.md
      - Milling Machine: millingmachine.md
      - CNC Router: cncrouter.md
      - Laser Engraver: laserengraver.md
      - Show Your Skills: machinelessons.md
