site_name: FRC Team 2064 Robotics Guide
site_description: Getting started in FRC!!
site_author: Team 2064 - The Panther Project
copyright: FRC Team 2064 ~ The Panther Project
repo_url: https://github.com/mrmarganski/mkdoc

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: red
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png
  favicon: img/favicon.ico
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/frc2064/

extra_javascript:
  - js/mermaid.min.js
  - js/custom.js

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:   
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  
  - Safety & Certification:
      - Safety Overview: safety/Safety.md
      - Certification Quiz: safety/Safetyquiz.md

  - XRP Robotics:
      - "XRP Overview":
          - XRP Introduction: xrprobotics/xrplanding.md
      - "Part 1: The Basics":
          - Build Guide: xrprobotics/module1/Build.md
          - Installing WPILib: xrprobotics/module1/gettingtoknow.md
          - Command-Based Code: xrprobotics/module1/basicdriveXRP.md
          - Skill Check - Drive Challenge: xrprobotics/module1/XRPdrivechallenge.md
      - "Part 2: Ping Pong Challenge":
          - Game Concepts: xrprobotics/module2/Ping-Pong-Launcher-Challenge.md
          - Assembly Guide: xrprobotics/module2/PingPongAssemble.md
          - Wiring Guide: xrprobotics/module2/wiringpingpongxrp.md
          - Coding the Launcher: xrprobotics/module2/pingpongcode.md
          - The Competition: xrprobotics/module2/PingPongCompetition.md

  - FRC Engineering:
      - Robot Basics:
          - Engineering Design Process: engineering/designprocess.md
          - Bumper Construction: engineering/bumpers.md
      - CAD Design:
          - FRC Design in Onshape: engineering/CAD.md
          - Skill Check - CAD Course: engineering/cadonshapecourse.md
      - Programming:
          - Java & WPILib Basics: engineering/WPIlib.md
          - Skill Check - Advanced Java: engineering/advancedjava.md

  - Shop & Manufacturing:
      - Hand Tools:
          - Closet Organization: fabrication/Closet.md
          - Hand Tools Overview: fabrication/Handtools.md
          - Wiring & Crimping: fabrication/crimping.md
          - Skill Check - Hand Tools: fabrication/handtoolsquiz.md
      - Machine Tools:
          - 3D Printing: fabrication/3dprinting.md
          - Bandsaw: fabrication/bandsaw.md
          - Lathe: fabrication/lathe.md
          - Milling Machine: fabrication/millingmachine.md
          - CNC Router: fabrication/cncrouter.md
          - Laser Engraver: fabrication/laserengraver.md
          - Skill Check - Machining: fabrication/machinelessons.md

  - Team Media & Branding:
      - Cricut Vinyl Cutter: media/cricut.md
      - Button Maker: media/buttonmaker.md
      - Adobe Photoshop: media/photoshop.md
      - Adobe Illustrator: media/illustrator.md
      - Branding Guidelines: media/branding.md
      - Public Speaking: media/publicspeaking.md

  - Resources:
      - Overview: resources/resourceslanding.md
      - FRC Glossary: resources/frckeywords.md
      - 2064 Core Values: resources/rubric.md
