name: Deploy to DreamHost
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mkdocs-material mkdocs-macros-plugin

      - name: Build MkDocs
        run: mkdocs build

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: "frc2064.com"
          REMOTE_USER: "brimar70"
          TARGET: "/home/brimar70/frc2064.com/mkdoc"
          SOURCE: "site/"
          # MOVE THE FLAG HERE:
          SSH_ARGS: "-p 22 -o StrictHostKeyChecking=no -o IdentitiesOnly=yes"
          # KEEP YOUR REGULAR ARGS CLEAN:
          ARGS: "-rlgoDzvc --delete"
